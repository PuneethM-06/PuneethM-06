name: Update profile art

# Refreshes the contribution graph SVG daily from real data.
# Runs daily, plus whenever you push to main, plus on-demand.

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC every day
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape real contribution data (no auth needed)
        run: python scripts/fetch_contributions.py

      - name: Record a daily automation heartbeat
        run: python scripts/record_heartbeat.py

      - name: Render animated contribution graph SVG
        run: python scripts/generate_streak_svg.py

      - name: Configure git identity
        run: |
          git config user.name "PuneethM-06"
          git config user.email "puneethm06@users.noreply.github.com"

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile heartbeat [skip ci]"
          file_pattern: "data/contributions.json data/automation-heartbeat.json contrib-heatmap.svg"
